services:
  app:
    image: jlny/opencode-proxy-hub:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env.docker
        required: false
    environment:
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: 6446
      ADMIN_PASSWORD: admin
      KEYS_FILE: /app/data/api-keys.json
      MODELS_FILE: /app/data/models.json
      SETTINGS_FILE: /app/data/settings.json
      PROXIES_FILE: /app/data/proxies.json
      LOGS_DIR: /app/logs
      REDIS_URL: redis://redis:6379
      STORE_PLAINTEXT_API_KEYS: "true"
      OUTBOUND_PRE_PROXY_ENABLED: "true"
      OUTBOUND_PRE_PROXY_URL: http://host.docker.internal:7897
      REQUIRE_PROXY: "true"
    ports:
      - "6446:6446"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6446/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
